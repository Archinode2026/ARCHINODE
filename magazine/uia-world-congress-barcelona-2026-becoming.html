    <h1 data-en="Barcelona and the Architecture of Transition" data-ko="바르셀로나가 던진 &#x27;전환기의 건축&#x27;">바르셀로나가 던진 &#x27;전환기의 건축&#x27;</h1>
    <p class="subtitle" data-en="UIA World Congress 2026 closes — &#x27;Becoming: Architectures for a Planet in Transition.&#x27;" data-ko="UIA 세계건축대회 2026 폐막 — &#x27;되어감: 전환하는 행성을 위한 건축&#x27;">UIA 세계건축대회 2026 폐막 — &#x27;되어감: 전환하는 행성을 위한 건축&#x27;</p>
    <div class="meta">2026-07-02 <span>·</span> ARCHINODE Editorial</div>
</section>
<article class="article-body">
<p class="lead" data-en="From June 28 to July 2, Barcelona hosted the 29th UIA World Congress of Architects under the theme &#x27;Becoming: Architectures for a Planet in Transition.&#x27; The city, named the 2026 UNESCO-UIA World Capital of Architecture, gathered architects, urbanists, researchers and policymakers around a single, deliberately unfinished verb — becoming — and a roughly 4,000-square-metre exhibition that treated architecture as a process rather than a monument." data-ko="6월 28일부터 7월 2일까지, 바르셀로나에서 제29회 UIA 세계건축대회가 &#x27;Becoming: 전환하는 행성을 위한 건축&#x27;이라는 주제로 열렸다. 2026년 유네스코-UIA 세계건축수도로 지정된 이 도시는 건축가, 도시계획가, 연구자, 정책결정자를 하나의 의도적으로 미완인 동사 — becoming(되어감) — 아래 불러 모았다. 약 4,000㎡ 규모의 전시는 건축을 기념비가 아니라 과정으로 다뤘다.">6월 28일부터 7월 2일까지, 바르셀로나에서 제29회 UIA 세계건축대회가 &#x27;Becoming: 전환하는 행성을 위한 건축&#x27;이라는 주제로 열렸다. 2026년 유네스코-UIA 세계건축수도로 지정된 이 도시는 건축가, 도시계획가, 연구자, 정책결정자를 하나의 의도적으로 미완인 동사 — becoming(되어감) — 아래 불러 모았다. 약 4,000㎡ 규모의 전시는 건축을 기념비가 아니라 과정으로 다뤘다.</p>
<h2 data-en="Why &#x27;Becoming&#x27; and Not &#x27;Built&#x27;" data-ko="왜 &#x27;지어진 것&#x27;이 아니라 &#x27;되어감&#x27;인가">왜 &#x27;지어진 것&#x27;이 아니라 &#x27;되어감&#x27;인가</h2>
<p data-en="Congress themes are rarely accidental. Choosing a gerund — becoming — over a noun is itself an argument: that in an age of climate stress, migration and material scarcity, the discipline&#x27;s center of gravity is shifting from the finished object to the ongoing transition. The Barcelona programme leaned into adaptation, reuse and the second life of structures rather than the icon-building that defined earlier decades. For a profession long organized around the singular masterpiece, that is a quiet but real reorientation." data-ko="대회 주제는 우연히 정해지지 않는다. 명사가 아니라 동명사 — becoming — 를 고른 것 자체가 하나의 주장이다. 기후 압력, 이주, 자원 부족의 시대에 이 분야의 무게중심이 완성된 사물에서 진행 중인 전환으로 옮겨가고 있다는 것. 바르셀로나 프로그램은 이전 수십 년을 정의했던 아이콘 건축보다 적응, 재사용, 구조물의 두 번째 삶에 기울었다. 오랫동안 단 하나의 걸작을 중심으로 조직돼 온 직업에게, 이것은 조용하지만 실질적인 방향 전환이다.">대회 주제는 우연히 정해지지 않는다. 명사가 아니라 동명사 — becoming — 를 고른 것 자체가 하나의 주장이다. 기후 압력, 이주, 자원 부족의 시대에 이 분야의 무게중심이 완성된 사물에서 진행 중인 전환으로 옮겨가고 있다는 것. 바르셀로나 프로그램은 이전 수십 년을 정의했던 아이콘 건축보다 적응, 재사용, 구조물의 두 번째 삶에 기울었다. 오랫동안 단 하나의 걸작을 중심으로 조직돼 온 직업에게, 이것은 조용하지만 실질적인 방향 전환이다.</p>
<figure><img src="../assets/magazine/placeholders/design.svg" alt="2026년 세계건축수도 바르셀로나는 건축을 명사가 아닌 동사로 규정했다."><figcaption data-en="Barcelona, the 2026 World Capital of Architecture, framed the discipline as a verb, not a noun." data-ko="2026년 세계건축수도 바르셀로나는 건축을 명사가 아닌 동사로 규정했다.">2026년 세계건축수도 바르셀로나는 건축을 명사가 아닌 동사로 규정했다.</figcaption></figure>
<h2 data-en="Where Korea Sits on This Map" data-ko="이 지도 위에서 한국의 위치">이 지도 위에서 한국의 위치</h2>
<p data-en="Globally, the transition agenda is no longer avant-garde; it is becoming the baseline. Europe writes reuse and embodied-carbon thinking into procurement; mass-timber and retrofit-first briefs are increasingly the default rather than the exception. Korea is not absent from this conversation — its timber-construction pilots, green-remodeling programs and net-zero building mandates run in parallel — but the framing still tends to treat sustainability as a compliance layer added on top of a conventional project, rather than the organizing idea the Barcelona theme insists on. The gap is less about technology than about sequence: whether transition is the premise or the afterthought." data-ko="세계적으로 전환 의제는 더 이상 전위가 아니라 기준선이 되어가고 있다. 유럽은 재사용과 내재탄소 사고를 조달에 명문화하고, 대량목재와 리트로핏 우선 설계가 예외가 아니라 기본값이 되어간다. 한국이 이 대화에서 빠져 있는 것은 아니다 — 목조건축 실증, 그린 리모델링 사업, 제로에너지건축 의무화가 나란히 굴러간다. 그러나 그 틀은 여전히 지속가능성을 일반 프로젝트 위에 덧대는 규제 계층으로 다루는 경향이 있다. 바르셀로나 주제가 요구하는 조직 원리로서가 아니라. 격차는 기술이 아니라 순서에 있다 — 전환이 전제인가, 아니면 나중에 붙는 생각인가.">세계적으로 전환 의제는 더 이상 전위가 아니라 기준선이 되어가고 있다. 유럽은 재사용과 내재탄소 사고를 조달에 명문화하고, 대량목재와 리트로핏 우선 설계가 예외가 아니라 기본값이 되어간다. 한국이 이 대화에서 빠져 있는 것은 아니다 — 목조건축 실증, 그린 리모델링 사업, 제로에너지건축 의무화가 나란히 굴러간다. 그러나 그 틀은 여전히 지속가능성을 일반 프로젝트 위에 덧대는 규제 계층으로 다루는 경향이 있다. 바르셀로나 주제가 요구하는 조직 원리로서가 아니라. 격차는 기술이 아니라 순서에 있다 — 전환이 전제인가, 아니면 나중에 붙는 생각인가.</p>
<blockquote data-en="&quot;Becoming is not a style. It is an admission that the building is never quite finished, and that this is a strength, not a failure.&quot;" data-ko="&quot;되어감은 양식이 아니다. 건물은 결코 완전히 끝나지 않는다는 인정이며, 그것이 실패가 아니라 강점이라는 선언이다.&quot;">&quot;되어감은 양식이 아니다. 건물은 결코 완전히 끝나지 않는다는 인정이며, 그것이 실패가 아니라 강점이라는 선언이다.&quot;</blockquote>
<h2 data-en="A City That Practices What It Hosts" data-ko="주최 도시가 스스로 실천하는 것">주최 도시가 스스로 실천하는 것</h2>
<p data-en="Barcelona is a pointed choice of host. This is the city of Gaudí&#x27;s still-unfinished Sagrada Família — a building literally defined by becoming — and of the superblock experiment that reclaimed street grids from cars for people. To hold a congress on transition here is to argue that the ideas are not conference abstractions but visible in the pavement and the skyline. That is the deeper lesson for any city that imports the vocabulary of sustainability: the theme only means something when it changes what actually gets built, reused, and lived in." data-ko="바르셀로나는 의도된 개최지 선택이다. 이곳은 여전히 미완인 가우디의 사그라다 파밀리아 — 말 그대로 &#x27;되어감&#x27;으로 정의되는 건물 — 의 도시이며, 자동차에게서 도로 격자를 되찾아 사람에게 돌려준 슈퍼블록 실험의 도시다. 이곳에서 전환을 주제로 대회를 여는 것은, 그 생각들이 학회의 추상이 아니라 보도블록과 스카이라인에 보인다는 주장이다. 지속가능성의 어휘를 수입하는 모든 도시에게 이것은 더 깊은 교훈이다 — 주제는 실제로 지어지고, 재사용되고, 살아가는 것을 바꿀 때에만 의미를 가진다.">바르셀로나는 의도된 개최지 선택이다. 이곳은 여전히 미완인 가우디의 사그라다 파밀리아 — 말 그대로 &#x27;되어감&#x27;으로 정의되는 건물 — 의 도시이며, 자동차에게서 도로 격자를 되찾아 사람에게 돌려준 슈퍼블록 실험의 도시다. 이곳에서 전환을 주제로 대회를 여는 것은, 그 생각들이 학회의 추상이 아니라 보도블록과 스카이라인에 보인다는 주장이다. 지속가능성의 어휘를 수입하는 모든 도시에게 이것은 더 깊은 교훈이다 — 주제는 실제로 지어지고, 재사용되고, 살아가는 것을 바꿀 때에만 의미를 가진다.</p>
<div class="editor-note">
<h3 data-en="Editor&apos;s Note" data-ko="편집장 코멘트">편집장 코멘트</h3>
<p data-en="For ARCHINODE, the Barcelona theme is a market forecast in disguise. When &#x27;transition&#x27; becomes the baseline of global practice, demand shifts toward materials that can document their own story — provenance, recycled content, embodied carbon, end-of-life. The brands that win the next decade will not be the ones that call themselves green, but the ones whose numbers survive scrutiny. A platform&#x27;s job is to make that verifiable data legible to the Korean market before the regulation forces it." data-ko="ARCHINODE에게 바르셀로나 주제는 위장된 시장 예측이다. &#x27;전환&#x27;이 세계 실무의 기준선이 되면, 수요는 자기 이야기를 문서로 증명할 수 있는 자재 — 원산지, 재생 함량, 내재탄소, 폐기 단계 — 로 옮겨간다. 다음 10년을 이기는 브랜드는 스스로를 친환경이라 부르는 곳이 아니라, 그 숫자가 검증을 견디는 곳이다. 플랫폼의 일은 규제가 강제하기 전에 그 검증 가능한 데이터를 한국 시장이 읽을 수 있게 만드는 것이다.">ARCHINODE에게 바르셀로나 주제는 위장된 시장 예측이다. &#x27;전환&#x27;이 세계 실무의 기준선이 되면, 수요는 자기 이야기를 문서로 증명할 수 있는 자재 — 원산지, 재생 함량, 내재탄소, 폐기 단계 — 로 옮겨간다. 다음 10년을 이기는 브랜드는 스스로를 친환경이라 부르는 곳이 아니라, 그 숫자가 검증을 견디는 곳이다. 플랫폼의 일은 규제가 강제하기 전에 그 검증 가능한 데이터를 한국 시장이 읽을 수 있게 만드는 것이다.</p>
