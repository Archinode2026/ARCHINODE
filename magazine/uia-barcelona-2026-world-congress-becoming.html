    <h1 data-en="10,000 Architects Are Heading to Barcelona" data-ko="세계 건축가 1만 명이 바르셀로나로 모인다">세계 건축가 1만 명이 바르셀로나로 모인다</h1>
    <p class="subtitle" data-en="UIA World Congress of Architects 2026 — the theme is &apos;Becoming&apos;, asking what architecture means for a planet in transition." data-ko="UIA 2026 바르셀로나 세계건축대회 — 주제는 &apos;비커밍(Becoming)&apos;, 전환의 시대에 건축을 묻다.">UIA 2026 바르셀로나 세계건축대회 — 주제는 '비커밍(Becoming)', 전환의 시대에 건축을 묻다.</p>
    <div class="meta">2026-06-16 <span>·</span> ARCHINODE Editorial</div>
</section>
<article class="article-body">
<p class="lead" data-en="From 28 June to 2 July 2026, Barcelona becomes the capital of world architecture. The UIA World Congress of Architects gathers more than 10,000 architects, students, and institutions from over 130 countries. Held every three years, it is the largest stage in the profession. This year&apos;s theme is &apos;Becoming&apos; — a single word that frames the unfinished, ongoing question of what buildings should become on a planet in transition." data-ko="2026년 6월 28일부터 7월 2일까지, 바르셀로나는 세계 건축의 수도가 된다. UIA 세계건축대회에는 130개국이 넘는 나라에서 건축가·학생·기관 1만 명 이상이 모인다. 3년마다 한 번 열리는, 이 분야에서 가장 큰 무대다. 올해의 주제는 &apos;비커밍(Becoming, 되어감)&apos; — 전환의 시대에 건축이 무엇이 되어야 하는가라는, 끝나지 않은 질문을 한 단어에 담았다.">2026년 6월 28일부터 7월 2일까지, 바르셀로나는 세계 건축의 수도가 된다. UIA 세계건축대회에는 130개국이 넘는 나라에서 건축가·학생·기관 1만 명 이상이 모인다. 3년마다 한 번 열리는, 이 분야에서 가장 큰 무대다. 올해의 주제는 '비커밍(Becoming, 되어감)' — 전환의 시대에 건축이 무엇이 되어야 하는가라는, 끝나지 않은 질문을 한 단어에 담았다.</p>
<h2 data-en="The Triennial Olympics of Architecture" data-ko="3년에 한 번, 건축의 올림픽">3년에 한 번, 건축의 올림픽</h2>
<p data-en="The UIA (International Union of Architects) World Congress is the discipline&apos;s closest thing to an Olympics. It moves cities every three years — Copenhagen in 2023, Barcelona in 2026 — and brings together not just star architects but national institutes, schools, and emerging practitioners. The full title this year reads &apos;Becoming: Architectures for a planet in transition.&apos; The choice of a present-progressive verb is deliberate: architecture is not a finished object but a process still underway, shaped by climate, technology, and shifting ways of living." data-ko="UIA(국제건축가연맹) 세계건축대회는 건축계의 올림픽에 가장 가깝다. 3년마다 도시를 옮겨 가며 열린다 — 2023년 코펜하겐, 2026년 바르셀로나. 스타 건축가뿐 아니라 각국 건축가협회, 학교, 신진 건축가까지 한자리에 모인다. 올해의 정식 주제는 &apos;비커밍: 전환하는 지구를 위한 건축들(Becoming: Architectures for a planet in transition)&apos;이다. 현재진행형 동사를 고른 것은 의도적이다. 건축은 완성된 사물이 아니라 기후·기술·삶의 방식에 따라 여전히 진행 중인 과정이라는 선언이다.">UIA(국제건축가연맹) 세계건축대회는 건축계의 올림픽에 가장 가깝다. 3년마다 도시를 옮겨 가며 열린다 — 2023년 코펜하겐, 2026년 바르셀로나. 스타 건축가뿐 아니라 각국 건축가협회, 학교, 신진 건축가까지 한자리에 모인다. 올해의 정식 주제는 '비커밍: 전환하는 지구를 위한 건축들(Becoming: Architectures for a planet in transition)'이다. 현재진행형 동사를 고른 것은 의도적이다. 건축은 완성된 사물이 아니라 기후·기술·삶의 방식에 따라 여전히 진행 중인 과정이라는 선언이다.</p>
<figure><img src="https://images.unsplash.com/photo-1539037116277-4db20889f2d4?w=1200&q=80" alt="바르셀로나 사그라다 파밀리아와 도시 풍경"><figcaption data-en="Barcelona — a city that turned architecture itself into urban identity (Image: Unsplash)" data-ko="바르셀로나 — 건축 그 자체를 도시 정체성으로 만든 도시 (이미지: Unsplash)">바르셀로나 — 건축 그 자체를 도시 정체성으로 만든 도시 (이미지: Unsplash)</figcaption></figure>
<h2 data-en="Six &apos;Becomings&apos;" data-ko="여섯 개의 &apos;되어감&apos;">여섯 개의 '되어감'</h2>
<p data-en="The congress program is structured around six thematic &apos;Becomings&apos; — six lenses through which the field reads its own near future. Rather than presenting finished answers, the structure organizes debate around how architecture is changing: in its relationship to the climate, to communities, to materials and resources, to technology, and to the city. It is less a showcase of completed icons than a working session on what the profession is turning into." data-ko="대회 프로그램은 여섯 개의 주제별 &apos;되어감(Becomings)&apos;을 축으로 짜였다. 건축계가 자신의 가까운 미래를 읽어내는 여섯 개의 렌즈다. 완성된 답을 늘어놓는 대신, 건축이 어떻게 변하고 있는가를 중심으로 토론을 조직한다 — 기후와의 관계, 공동체와의 관계, 자재와 자원, 기술, 그리고 도시. 완성된 아이콘을 전시하는 자리라기보다, 이 직업이 무엇으로 변해 가는지를 함께 작업하는 회의에 가깝다.">대회 프로그램은 여섯 개의 주제별 '되어감(Becomings)'을 축으로 짜였다. 건축계가 자신의 가까운 미래를 읽어내는 여섯 개의 렌즈다. 완성된 답을 늘어놓는 대신, 건축이 어떻게 변하고 있는가를 중심으로 토론을 조직한다 — 기후와의 관계, 공동체와의 관계, 자재와 자원, 기술, 그리고 도시. 완성된 아이콘을 전시하는 자리라기보다, 이 직업이 무엇으로 변해 가는지를 함께 작업하는 회의에 가깝다.</p>
<blockquote data-en="&quot;Becoming is a verb, not a noun. The congress is not asking what architecture is, but what it is turning into.&quot;" data-ko="&quot;비커밍은 명사가 아니라 동사다. 대회는 건축이 무엇인가가 아니라, 무엇이 되어 가는가를 묻는다.&quot;">"비커밍은 명사가 아니라 동사다. 대회는 건축이 무엇인가가 아니라, 무엇이 되어 가는가를 묻는다."</blockquote>
<h2 data-en="A June When the World Talks Architecture at Once" data-ko="6월, 세계가 동시에 건축을 이야기한다">6월, 세계가 동시에 건축을 이야기한다</h2>
<p data-en="The Barcelona congress does not stand alone. June 2026 is unusually dense with architecture and design gatherings. The London Festival of Architecture runs all month under the theme &apos;Belonging&apos;, activating eleven neighbourhoods. San Francisco Design Week marks its 20th anniversary with the theme &apos;Multitudes&apos;. Architizer revealed its 14th A+Awards winners on 8 June, and Design Doha&apos;s biennale continues through the end of the month. Read together, these events share one undercurrent: a move away from the lone genius and the finished monument, toward belonging, plurality, and transition." data-ko="바르셀로나 대회만 있는 것이 아니다. 2026년 6월은 유난히 건축·디자인 행사가 빽빽하다. 런던건축축제(London Festival of Architecture)는 &apos;소속(Belonging)&apos;을 주제로 한 달 내내 11개 지역에서 펼쳐진다. 샌프란시스코 디자인위크는 &apos;다중성(Multitudes)&apos;을 내걸고 20주년을 맞았다. 아키타이저(Architizer)는 6월 8일 제14회 A+어워드 수상작을 발표했고, 디자인 도하 비엔날레는 6월 말까지 이어진다. 이 행사들을 함께 읽으면 하나의 저류가 보인다 — 고독한 천재와 완성된 기념비에서 벗어나, 소속·다양성·전환으로 무게가 옮겨 가고 있다는 것.">바르셀로나 대회만 있는 것이 아니다. 2026년 6월은 유난히 건축·디자인 행사가 빽빽하다. 런던건축축제(London Festival of Architecture)는 '소속(Belonging)'을 주제로 한 달 내내 11개 지역에서 펼쳐진다. 샌프란시스코 디자인위크는 '다중성(Multitudes)'을 내걸고 20주년을 맞았다. 아키타이저(Architizer)는 6월 8일 제14회 A+어워드 수상작을 발표했고, 디자인 도하 비엔날레는 6월 말까지 이어진다. 이 행사들을 함께 읽으면 하나의 저류가 보인다 — 고독한 천재와 완성된 기념비에서 벗어나, 소속·다양성·전환으로 무게가 옮겨 가고 있다는 것.</p>
<h2 data-en="Where Does Korean Architecture Stand?" data-ko="한국 건축은 어디에 서 있나">한국 건축은 어디에 서 있나</h2>
<p data-en="For a Korean reader, the more interesting question is positional. The themes Barcelona puts at the center — carbon, circular materials, community, the unfinished city — are precisely the areas where Korea has been building real expertise: timber high-rises, green remodeling, modular housing, certified low-carbon materials. The gap is rarely capability; it is voice. Korean work shows up as products and projects, but less often as the frameworks and vocabulary that set the global agenda. A congress organized around &apos;becoming&apos; is, in that sense, an opening — a reminder that the conversation is still being written, and there is room to write in it." data-ko="한국 독자에게 더 흥미로운 질문은 &apos;위치&apos;다. 바르셀로나가 한가운데 놓은 주제들 — 탄소, 순환 자재, 공동체, 미완의 도시 — 은 사실 한국이 실력을 쌓아 온 바로 그 영역이다. 목조 고층, 그린 리모델링, 모듈러 주택, 저탄소 인증 자재까지. 부족한 것은 대개 역량이 아니라 &apos;목소리&apos;다. 한국의 작업은 제품과 프로젝트로는 등장하지만, 글로벌 의제를 짜는 틀과 언어로는 덜 등장한다. &apos;되어감&apos;을 축으로 삼은 대회는 그래서 하나의 틈새다 — 대화는 아직 쓰이는 중이고, 그 안에 써넣을 자리가 남아 있다는 신호다.">한국 독자에게 더 흥미로운 질문은 '위치'다. 바르셀로나가 한가운데 놓은 주제들 — 탄소, 순환 자재, 공동체, 미완의 도시 — 은 사실 한국이 실력을 쌓아 온 바로 그 영역이다. 목조 고층, 그린 리모델링, 모듈러 주택, 저탄소 인증 자재까지. 부족한 것은 대개 역량이 아니라 '목소리'다. 한국의 작업은 제품과 프로젝트로는 등장하지만, 글로벌 의제를 짜는 틀과 언어로는 덜 등장한다. '되어감'을 축으로 삼은 대회는 그래서 하나의 틈새다 — 대화는 아직 쓰이는 중이고, 그 안에 써넣을 자리가 남아 있다는 신호다.</p>
<div class="editor-note">
<h3 data-en="Editor&apos;s Note" data-ko="편집장 코멘트">편집장 코멘트</h3>
<p data-en="ARCHINODE&apos;s mission — connecting global architecture and design brands with the Korean market — sits exactly on the fault line this congress names. &apos;Transition&apos; is not an abstract slogan for a materials platform; it is the daily reality of carbon data, circular sourcing, and certification that buyers now demand. The brands that will matter in Korea over the next three years are the ones already fluent in the vocabulary Barcelona is rehearsing this summer. Watching which &apos;becomings&apos; gather momentum is, for us, a way of reading next season&apos;s demand." data-ko="ARCHINODE의 미션 — 글로벌 건축·디자인 브랜드를 한국 시장과 잇는 것 — 은 이 대회가 호명하는 단층선 위에 정확히 놓여 있다. &apos;전환&apos;은 자재 플랫폼에게 추상적 구호가 아니다. 바이어가 이제 요구하는 탄소 데이터, 순환 소싱, 인증의 일상적 현실이다. 앞으로 3년간 한국에서 의미 있을 브랜드는, 바르셀로나가 올여름 연습하는 언어에 이미 능숙한 브랜드다. 어떤 &apos;되어감&apos;이 힘을 받는지 지켜보는 일은, 우리에게 다음 시즌 수요를 미리 읽는 방법이다.">ARCHINODE의 미션 — 글로벌 건축·디자인 브랜드를 한국 시장과 잇는 것 — 은 이 대회가 호명하는 단층선 위에 정확히 놓여 있다. '전환'은 자재 플랫폼에게 추상적 구호가 아니다. 바이어가 이제 요구하는 탄소 데이터, 순환 소싱, 인증의 일상적 현실이다. 앞으로 3년간 한국에서 의미 있을 브랜드는, 바르셀로나가 올여름 연습하는 언어에 이미 능숙한 브랜드다. 어떤 '되어감'이 힘을 받는지 지켜보는 일은, 우리에게 다음 시즌 수요를 미리 읽는 방법이다.</p>
