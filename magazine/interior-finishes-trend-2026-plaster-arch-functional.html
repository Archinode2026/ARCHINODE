    <h1 data-en="Walls Get Their Texture Back" data-ko="벽이 다시 손맛을 입는다">벽이 다시 손맛을 입는다</h1>
    <p class="subtitle" data-en="Plaster walls, earthy tones, arch doors, and quietly functional finishes — what the 2026 finishes shift means for your home, and what it actually costs to build." data-ko="회벽과 어시 톤, 아치 도어, 그리고 조용히 일하는 기능성 마감재. 2026 마감재 흐름이 내 집에서 무엇을 바꾸고, 시공에는 얼마가 드는가.">회벽과 어시 톤, 아치 도어, 그리고 조용히 일하는 기능성 마감재. 2026 마감재 흐름이 내 집에서 무엇을 바꾸고, 시공에는 얼마가 드는가.</p>
    <div class="meta">2026-06-12 <span>·</span> ARCHINODE Editorial</div>
</section>
<article class="article-body">
<p class="lead" data-en="For a decade, the Korean interior ideal was flat, white, and seamless: no moldings, no shadows, surfaces that looked like they were printed rather than built. In 2026 the pendulum is swinging back toward the hand. Plaster-look walls, warm earthy palettes, arched doorways, and finishes that quietly do a job — absorb sound, resist fire — are showing up across trade-fair lineups and remodeling quotes alike. The question for a homeowner is the practical one: which of these is worth paying for, and which is just a photograph that will not survive contact with a real apartment." data-ko="지난 10년, 한국 인테리어의 이상은 평평하고 하얗고 이음매 없는 것이었다. 몰딩도 그림자도 없이, 시공했다기보다 인쇄한 듯한 면. 2026년에는 추가 다시 '손' 쪽으로 돌아오고 있다. 회벽 느낌의 벽, 따뜻한 어시 톤, 아치형 문, 그리고 조용히 제 일을 하는 마감재 — 소리를 흡수하고 불에 버티는 — 가 박람회 출품 라인업과 리모델링 견적서에 함께 등장한다. 집주인에게 남는 질문은 실용적인 쪽이다. 이 중 무엇이 돈을 쓸 값을 하고, 무엇이 실제 아파트와 부딪히면 살아남지 못할 한 장의 사진인가.">지난 10년, 한국 인테리어의 이상은 평평하고 하얗고 이음매 없는 것이었다. 몰딩도 그림자도 없이, 시공했다기보다 인쇄한 듯한 면. 2026년에는 추가 다시 '손' 쪽으로 돌아오고 있다. 회벽 느낌의 벽, 따뜻한 어시 톤, 아치형 문, 그리고 조용히 제 일을 하는 마감재 — 소리를 흡수하고 불에 버티는 — 가 박람회 출품 라인업과 리모델링 견적서에 함께 등장한다. 집주인에게 남는 질문은 실용적인 쪽이다. 이 중 무엇이 돈을 쓸 값을 하고, 무엇이 실제 아파트와 부딪히면 살아남지 못할 한 장의 사진인가.</p>
<h2 data-en="The Wall Returns to Texture" data-ko="벽, 질감으로 돌아오다">벽, 질감으로 돌아오다</h2>
<p data-en="The headline shift is the plaster wall. After years of flat paint and film, designers are reaching for troweled, slightly uneven surfaces that catch light and read as material rather than coating. Two routes coexist. One is genuine mineral or lime plaster, applied by hand in layers. The other is a high-end board that digitally prints stone veining and natural texture so convincingly that, from a meter away, you reach out to check. The trend pairs naturally with the seamless, molding-free look that already dominates — except now the seamless surface has grain." data-ko="가장 큰 변화는 회벽이다. 평면 도장과 필름의 시대를 지나, 디자이너들은 흙손 자국이 살아 빛을 받아내는, 코팅이 아니라 재료로 읽히는 약간 울퉁불퉁한 면으로 손을 뻗는다. 두 갈래가 공존한다. 하나는 진짜 미네랄·석회 미장으로, 손으로 여러 켜를 올린다. 다른 하나는 천연 석재의 베인 무늬와 질감을 디지털 프린팅으로 정교하게 구현한 하이엔드 보드로, 1미터 떨어져 보면 손을 뻗어 만져 확인하게 만든다. 이 흐름은 이미 주류인 무몰딩·심리스 룩과 자연스럽게 맞물린다. 다만 이제 그 이음매 없는 면에 결이 생겼다.">가장 큰 변화는 회벽이다. 평면 도장과 필름의 시대를 지나, 디자이너들은 흙손 자국이 살아 빛을 받아내는, 코팅이 아니라 재료로 읽히는 약간 울퉁불퉁한 면으로 손을 뻗는다. 두 갈래가 공존한다. 하나는 진짜 미네랄·석회 미장으로, 손으로 여러 켜를 올린다. 다른 하나는 천연 석재의 베인 무늬와 질감을 디지털 프린팅으로 정교하게 구현한 하이엔드 보드로, 1미터 떨어져 보면 손을 뻗어 만져 확인하게 만든다. 이 흐름은 이미 주류인 무몰딩·심리스 룩과 자연스럽게 맞물린다. 다만 이제 그 이음매 없는 면에 결이 생겼다.</p>
<figure><img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=1200&q=80" alt="질감 있는 벽과 따뜻한 톤의 거실"><figcaption data-en="Earthy tones — terracotta, caramel, chocolate brown — replace the cool grays of the last cycle (Image: Unsplash)" data-ko="테라코타·카라멜·초콜릿 브라운의 어시 톤이 지난 사이클의 차가운 그레이를 대체한다 (이미지: Unsplash)">테라코타·카라멜·초콜릿 브라운의 어시 톤이 지난 사이클의 차가운 그레이를 대체한다 (이미지: Unsplash)</figcaption></figure>
<p data-en="Color moves with it. The cool grays and stark whites of the last cycle give way to earthy tones — terracotta, caramel, chocolate brown — and a broader sensibility some are calling &quot;tailored classic&quot;: the dignity of classic detailing held in check by contemporary restraint. For a homeowner, the cost gap between the two plaster routes is real. Hand-applied lime plaster is labor-heavy and unforgiving of a rushed crew; the printed board installs faster and cheaper but cannot be patched invisibly if a corner chips. Neither is wrong. They are simply different bets on how much imperfection you want to live with." data-ko="색도 함께 움직인다. 지난 사이클의 차가운 그레이와 새하얀 화이트가 어시 톤 — 테라코타, 카라멜, 초콜릿 브라운 — 에, 그리고 일부가 '테일러드 클래식'이라 부르는 더 넓은 감각에 자리를 내준다. 클래식 디테일의 품격을 현대적 절제로 눌러 쥔 감각이다. 집주인 입장에서 두 회벽 방식 사이의 비용 차이는 실재한다. 손미장 석회는 인건비가 무겁고 서두르는 작업팀을 용서하지 않는다. 프린팅 보드는 더 빠르고 싸게 시공되지만 모서리가 깨지면 티 안 나게 보수하기 어렵다. 둘 다 틀린 선택은 아니다. 단지 불완전함을 얼마나 안고 살 것인가에 대한 서로 다른 베팅일 뿐이다.">색도 함께 움직인다. 지난 사이클의 차가운 그레이와 새하얀 화이트가 어시 톤 — 테라코타, 카라멜, 초콜릿 브라운 — 에, 그리고 일부가 '테일러드 클래식'이라 부르는 더 넓은 감각에 자리를 내준다. 클래식 디테일의 품격을 현대적 절제로 눌러 쥔 감각이다. 집주인 입장에서 두 회벽 방식 사이의 비용 차이는 실재한다. 손미장 석회는 인건비가 무겁고 서두르는 작업팀을 용서하지 않는다. 프린팅 보드는 더 빠르고 싸게 시공되지만 모서리가 깨지면 티 안 나게 보수하기 어렵다. 둘 다 틀린 선택은 아니다. 단지 불완전함을 얼마나 안고 살 것인가에 대한 서로 다른 베팅일 뿐이다.</p>
<h2 data-en="The Arch Door, and the Cost of a Curve" data-ko="아치 도어, 그리고 곡선의 값">아치 도어, 그리고 곡선의 값</h2>
<p data-en="The arch is the season's signature gesture — a curved doorway softening the relentless straight lines of an apartment, lending a room rhythm and a sense of ease. It photographs beautifully. On site, it is also where the budget quietly leaves the building. A true arch means custom framing, a curved door leaf or a built opening, more skilled carpentry hours, and finishing that has to follow the curve cleanly. A painted-on arch effect costs almost nothing; a structural one can run several times a standard doorway. The honest middle path many crews recommend is one arch, placed where it does the most work — an entry, a hallway threshold — rather than arches everywhere." data-ko="아치는 이번 시즌의 서명 같은 제스처다. 아파트의 끝없는 직선을 누그러뜨리는 곡선 출입구로, 공간에 리듬과 여유를 준다. 사진은 아름답게 나온다. 그런데 현장에서는 바로 여기서 예산이 조용히 건물을 빠져나간다. 진짜 아치는 맞춤 틀, 곡선 문짝 혹은 조적 개구부, 더 많은 숙련 목공 시간, 그리고 곡선을 깔끔히 따라가는 마감을 뜻한다. 그려 넣은 아치 효과는 거의 공짜지만, 구조로 된 아치는 표준 출입구의 몇 배가 들 수 있다. 많은 작업팀이 권하는 정직한 절충안은, 사방에 아치를 두르는 대신 가장 효과가 큰 곳 하나 — 현관, 복도의 문지방 — 에 아치 하나를 두는 것이다.">아치는 이번 시즌의 서명 같은 제스처다. 아파트의 끝없는 직선을 누그러뜨리는 곡선 출입구로, 공간에 리듬과 여유를 준다. 사진은 아름답게 나온다. 그런데 현장에서는 바로 여기서 예산이 조용히 건물을 빠져나간다. 진짜 아치는 맞춤 틀, 곡선 문짝 혹은 조적 개구부, 더 많은 숙련 목공 시간, 그리고 곡선을 깔끔히 따라가는 마감을 뜻한다. 그려 넣은 아치 효과는 거의 공짜지만, 구조로 된 아치는 표준 출입구의 몇 배가 들 수 있다. 많은 작업팀이 권하는 정직한 절충안은, 사방에 아치를 두르는 대신 가장 효과가 큰 곳 하나 — 현관, 복도의 문지방 — 에 아치 하나를 두는 것이다.</p>
<blockquote data-en="&quot;The arch is cheap to draw and expensive to build. Put one where it earns its keep, not five because the moodboard had five.&quot;" data-ko="&quot;아치는 그리기엔 싸고 짓기엔 비싸다. 무드보드에 다섯 개 있었다고 다섯 개를 두지 말고, 값을 하는 자리에 하나를 둬라.&quot;">"아치는 그리기엔 싸고 짓기엔 비싸다. 무드보드에 다섯 개 있었다고 다섯 개를 두지 말고, 값을 하는 자리에 하나를 둬라."</blockquote>
<p data-en="The least photogenic part of the 2026 lineup may be the most consequential: functional finishes. Trade-fair entries increasingly lead with performance — acoustic absorption, fire-safety ratings — rather than looks alone. This is not fashion; it is the market catching up to tightened building codes and a public that has lived through noise complaints and safety headlines. A sound-absorbing panel in a child's room or a shared wall, a fire-rated finish in a kitchen, reads as boring on a moodboard and pays itself back every single day someone lives there." data-ko="2026년 라인업에서 가장 사진이 안 받는 부분이 가장 중요할지도 모른다. 기능성 마감재다. 박람회 출품작들은 점점 외관만이 아니라 성능 — 흡음, 방화 성능 — 을 앞세운다. 이건 유행이 아니다. 강화된 건축 기준과, 층간소음 민원과 안전 사고 헤드라인을 겪어온 대중을 시장이 뒤늦게 따라잡는 것이다. 아이 방이나 공유 벽의 흡음 패널, 주방의 방화 마감재는 무드보드에서는 지루하게 읽히지만, 누군가 그곳에서 사는 매일매일 제값을 돌려준다.">2026년 라인업에서 가장 사진이 안 받는 부분이 가장 중요할지도 모른다. 기능성 마감재다. 박람회 출품작들은 점점 외관만이 아니라 성능 — 흡음, 방화 성능 — 을 앞세운다. 이건 유행이 아니다. 강화된 건축 기준과, 층간소음 민원과 안전 사고 헤드라인을 겪어온 대중을 시장이 뒤늦게 따라잡는 것이다. 아이 방이나 공유 벽의 흡음 패널, 주방의 방화 마감재는 무드보드에서는 지루하게 읽히지만, 누군가 그곳에서 사는 매일매일 제값을 돌려준다.</p>
<h2 data-en="What to Actually Do With This" data-ko="그래서 실제로 무엇을 할 것인가">그래서 실제로 무엇을 할 것인가</h2>
<p data-en="If you are remodeling this year, a workable order of priorities falls out of all this. Spend first on the things you cannot easily redo — the functional layer behind the wall, the one structural arch, the plaster on the surface you touch and see most. Treat color and the more decorative gestures as the cheap, reversible layer; earthy tones can be repainted in a weekend when the cycle turns again. And be honest about the crew: textured plaster and clean curves expose unskilled labor mercilessly, so the finish trend is, underneath, a quiet argument for paying for a better installer rather than a flashier material." data-ko="올해 리모델링을 한다면, 이 모든 것에서 쓸 만한 우선순위가 나온다. 쉽게 다시 못 하는 것에 먼저 돈을 써라. 벽 뒤의 기능층, 구조로 된 아치 하나, 가장 많이 만지고 보는 면의 회벽. 색과 더 장식적인 제스처는 싸고 되돌릴 수 있는 층으로 다뤄라. 어시 톤은 사이클이 또 바뀌면 주말 하나로 다시 칠하면 된다. 그리고 작업팀에 대해 정직하라. 질감 있는 미장과 깔끔한 곡선은 미숙한 손을 가차 없이 드러낸다. 그러니 마감 트렌드는 그 밑바닥에서, 더 화려한 자재보다 더 나은 시공자에게 돈을 쓰라는 조용한 주장이다.">올해 리모델링을 한다면, 이 모든 것에서 쓸 만한 우선순위가 나온다. 쉽게 다시 못 하는 것에 먼저 돈을 써라. 벽 뒤의 기능층, 구조로 된 아치 하나, 가장 많이 만지고 보는 면의 회벽. 색과 더 장식적인 제스처는 싸고 되돌릴 수 있는 층으로 다뤄라. 어시 톤은 사이클이 또 바뀌면 주말 하나로 다시 칠하면 된다. 그리고 작업팀에 대해 정직하라. 질감 있는 미장과 깔끔한 곡선은 미숙한 손을 가차 없이 드러낸다. 그러니 마감 트렌드는 그 밑바닥에서, 더 화려한 자재보다 더 나은 시공자에게 돈을 쓰라는 조용한 주장이다.</p>

<div class="editor-note">
<h3 data-en="Editor's Note" data-ko="편집장 코멘트">편집장 코멘트</h3>
<p data-en="For ARCHINODE, the 2026 finishes shift sorts brands into two useful piles. One pile sells a look — a film, a print, a color — and competes on image and price. The other sells performance you can certify: acoustic ratings, fire classifications, the behavior of a real mineral plaster over ten years. The platform's job is to make the second pile legible to Korean buyers who have learned, the hard way, that the prettiest moodboard is not the one they want to live inside. A finish that shows its texture and proves its number is the easiest brand story to tell, and the hardest to fake." data-ko="ARCHINODE 입장에서 2026 마감재 흐름은 브랜드를 두 무더기로 유용하게 나눈다. 한 무더기는 룩을 판다. 필름, 프린트, 색. 이미지와 가격으로 경쟁한다. 다른 무더기는 인증 가능한 성능을 판다. 흡음 등급, 방화 분류, 진짜 미네랄 미장이 10년에 걸쳐 보이는 거동. 플랫폼의 일은, 가장 예쁜 무드보드가 자기가 살고 싶은 집이 아니라는 것을 어렵게 배운 한국 구매자에게 두 번째 무더기를 또렷이 읽히게 하는 것이다. 질감을 드러내고 숫자를 증명하는 마감재는 가장 들려주기 쉬운 브랜드 이야기이자, 가장 위조하기 어려운 이야기다.">ARCHINODE 입장에서 2026 마감재 흐름은 브랜드를 두 무더기로 유용하게 나눈다. 한 무더기는 룩을 판다. 필름, 프린트, 색. 이미지와 가격으로 경쟁한다. 다른 무더기는 인증 가능한 성능을 판다. 흡음 등급, 방화 분류, 진짜 미네랄 미장이 10년에 걸쳐 보이는 거동. 플랫폼의 일은, 가장 예쁜 무드보드가 자기가 살고 싶은 집이 아니라는 것을 어렵게 배운 한국 구매자에게 두 번째 무더기를 또렷이 읽히게 하는 것이다. 질감을 드러내고 숫자를 증명하는 마감재는 가장 들려주기 쉬운 브랜드 이야기이자, 가장 위조하기 어려운 이야기다.</p>
