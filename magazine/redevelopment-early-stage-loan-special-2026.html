    <h1 data-en="A 1% Loan Restarts Stalled Redevelopment Sites" data-ko="연 1% 융자가 멈춰 있던 재개발 현장을 다시 움직인다">연 1% 융자가 멈춰 있던 재개발 현장을 다시 움직인다</h1>
    <p class="subtitle" data-en="A government 1% special loan and Seoul&apos;s 18-billion-won fund — the early-stage cash crunch eases." data-ko="국토부 연 1% 특판과 서울시 180억 융자 — 초기 자금난에 묶여 있던 추진위·조합이 다시 움직이기 시작했다.">국토부 연 1% 특판과 서울시 180억 융자 — 초기 자금난에 묶여 있던 추진위·조합이 다시 움직이기 시작했다.</p>
    <div class="meta">2026-06-15 <span>·</span> ARCHINODE Editorial</div>
</section>
<article class="article-body">
<p class="lead" data-en="The biggest enemy of reconstruction and redevelopment is often not &apos;no money&apos; but &apos;no money early on.&apos; It is common for a project to stall for months because the committee or union cannot secure the initial consulting and operating costs. In 2026, the Ministry of Land&apos;s 1% special loan and Seoul City&apos;s 18-billion-won low-rate fund take direct aim at exactly this early-stage bottleneck." data-ko="재건축·재개발의 가장 큰 적은 종종 &apos;돈이 없어서&apos;가 아니라 &apos;초기에 돈이 없어서&apos;다. 추진위원회와 조합이 사업 초기 용역비와 운영비를 마련하지 못해 사업이 몇 달씩 멈추는 일이 흔하다. 2026년, 국토교통부의 연 1% 특판 융자와 서울시의 180억 원 규모 저리융자가 바로 이 초기 자금의 병목을 겨냥했다.">재건축·재개발의 가장 큰 적은 종종 '돈이 없어서'가 아니라 '초기에 돈이 없어서'다. 추진위원회와 조합이 사업 초기 용역비와 운영비를 마련하지 못해 사업이 몇 달씩 멈추는 일이 흔하다. 2026년, 국토교통부의 연 1% 특판 융자와 서울시의 180억 원 규모 저리융자가 바로 이 초기 자금의 병목을 겨냥했다.</p>
<h2 data-en="The Shock of 1% a Year" data-ko="연 1%라는 파격">연 1%라는 파격</h2>
<p data-en="The Ministry of Land&apos;s special early-stage cost loan applies an annual interest rate of 1%. The HUG guarantee fee runs about 0.4% for committees and 0.2% for unions. The special offer applies only to sites that complete application and approval by December 31, 2026. Against market rates these terms are striking, and reporting indicates inquiries from committees and unions are rising quickly." data-ko="국토교통부가 운영 중인 정비사업 초기사업비 특판 상품은 연 이자율 1%를 적용한다. 주택도시보증공사(HUG) 보증료율은 추진위원회 0.4%, 조합 0.2% 수준이다. 특판은 2026년 12월 31일까지 신청과 승인 절차가 완료된 사업장에 한해 적용된다. 시중 금리 대비 파격적인 조건이라, 보도에 따르면 추진위·조합의 문의가 빠르게 늘고 있다.">국토교통부가 운영 중인 정비사업 초기사업비 특판 상품은 연 이자율 1%를 적용한다. 주택도시보증공사(HUG) 보증료율은 추진위원회 0.4%, 조합 0.2% 수준이다. 특판은 2026년 12월 31일까지 신청과 승인 절차가 완료된 사업장에 한해 적용된다. 시중 금리 대비 파격적인 조건이라, 보도에 따르면 추진위·조합의 문의가 빠르게 늘고 있다.</p>
<p data-en="Seoul City is moving separately. Under its 2026 redevelopment loan plan worth 18 billion won total, committees can borrow up to 1–1.5 billion won depending on site size, and unions up to 2–6 billion won. New 2026 loans carry 2.5% a year for secured loans and 4.0% for unsecured. When the ministry&apos;s special offer and Seoul&apos;s support overlap, the menu of options for raising early-stage costs widens considerably." data-ko="서울시도 별도로 움직인다. 총 180억 원 규모의 2026년 정비사업 융자금 지원계획에 따라, 추진위원회는 사업장 규모에 따라 최대 10억–15억 원, 조합은 최대 20억–60억 원까지 융자를 받을 수 있다. 2026년 신규 융자 건에는 담보대출 연 2.5%, 신용대출 연 4.0%가 적용된다. 국토부 특판과 서울시 지원이 겹치면, 초기 사업비 조달의 선택지가 한층 넓어진다.">서울시도 별도로 움직인다. 총 180억 원 규모의 2026년 정비사업 융자금 지원계획에 따라, 추진위원회는 사업장 규모에 따라 최대 10억–15억 원, 조합은 최대 20억–60억 원까지 융자를 받을 수 있다. 2026년 신규 융자 건에는 담보대출 연 2.5%, 신용대출 연 4.0%가 적용된다. 국토부 특판과 서울시 지원이 겹치면, 초기 사업비 조달의 선택지가 한층 넓어진다.</p>
<figure><img src="../assets/magazine/placeholders/design.svg" alt="값싼 초기 자금이 다음 물량을 조용히 재가동시킨다 (이미지: Unsplash)"><figcaption data-en="Cheap early-stage money quietly restarts the next wave of projects (Image: Unsplash)" data-ko="값싼 초기 자금이 다음 물량을 조용히 재가동시킨다 (이미지: Unsplash)">값싼 초기 자금이 다음 물량을 조용히 재가동시킨다 (이미지: Unsplash)</figcaption></figure>
<h2 data-en="Why &apos;Early Money&apos; Is the Bottleneck" data-ko="왜 &apos;초기 자금&apos;이 병목인가">왜 '초기 자금'이 병목인가</h2>
<p data-en="The early stage of a redevelopment project has no revenue. Drawing up the plan, estimating contributions, design consulting, and collecting consent forms all cost money, but the sales income to recoup it arrives much later. Because of this time lag, early projects must rely on outside funds — and in a high-rate environment, the interest burden of that early borrowing becomes the decisive factor that sinks a project. A 1% loan is precisely a device for lowering the cost of that lag." data-ko="정비사업의 초기 단계에는 매출이 없다. 정비계획 수립, 추정 분담금 산정, 설계 용역, 조합 설립 동의서 징구 같은 작업에 돈이 들지만, 그 비용을 회수할 분양 수입은 한참 뒤에야 들어온다. 이 시차 때문에 사업 초기엔 외부 자금에 의존할 수밖에 없는데, 고금리 국면에서는 이 초기 대출의 이자 부담이 사업을 주저앉히는 결정적 요인이 된다. 연 1% 융자는 바로 그 시차의 비용을 낮추는 장치다.">정비사업의 초기 단계에는 매출이 없다. 정비계획 수립, 추정 분담금 산정, 설계 용역, 조합 설립 동의서 징구 같은 작업에 돈이 들지만, 그 비용을 회수할 분양 수입은 한참 뒤에야 들어온다. 이 시차 때문에 사업 초기엔 외부 자금에 의존할 수밖에 없는데, 고금리 국면에서는 이 초기 대출의 이자 부담이 사업을 주저앉히는 결정적 요인이 된다. 연 1% 융자는 바로 그 시차의 비용을 낮추는 장치다.</p>
<blockquote data-en="“Projects usually stall not because there is no money, but because borrowing money early is too expensive.”" data-ko="“정비사업이 멈추는 이유는 대개 &apos;돈이 없어서&apos;가 아니라 &apos;초기에 돈을 빌리기 너무 비싸서&apos;다.”">“정비사업이 멈추는 이유는 대개 '돈이 없어서'가 아니라 '초기에 돈을 빌리기 너무 비싸서'다.”</blockquote>
<h2 data-en="What the Materials and Construction Market Should Read" data-ko="자재·시공 시장이 읽어야 할 것">자재·시공 시장이 읽어야 할 것</h2>
<p data-en="When early money loosens, stalled sites move to the next stage. That is a signal that potential volume — which will become groundbreaking and sales in a few years — is being &apos;restarted&apos; now. For the materials and construction trade, the special loan is less a near-term order and more a leading indicator of the demand pipeline two to three years out. Track which sites in which districts are taking early loans and starting to move, and you can map mid-term demand before anyone else." data-ko="초기 자금이 풀리면 멈춰 있던 사업장들이 다음 단계로 넘어간다. 이는 곧 수년 뒤 착공·분양으로 이어질 잠재 물량이 지금 &apos;재가동&apos;되고 있다는 신호다. 자재·시공 업계 입장에서 융자 특판은 단기 발주가 아니라, 2–3년 뒤 수요 파이프라인을 가늠하는 선행 지표에 가깝다. 어느 지역의 어떤 사업장이 지금 초기 융자를 받고 움직이기 시작했는지를 추적하면, 중기 수요의 지도를 먼저 그릴 수 있다.">초기 자금이 풀리면 멈춰 있던 사업장들이 다음 단계로 넘어간다. 이는 곧 수년 뒤 착공·분양으로 이어질 잠재 물량이 지금 '재가동'되고 있다는 신호다. 자재·시공 업계 입장에서 융자 특판은 단기 발주가 아니라, 2–3년 뒤 수요 파이프라인을 가늠하는 선행 지표에 가깝다. 어느 지역의 어떤 사업장이 지금 초기 융자를 받고 움직이기 시작했는지를 추적하면, 중기 수요의 지도를 먼저 그릴 수 있다.</p>
<p data-en="Still, overheating warrants caution. A 1% rate can pull even sites with unproven feasibility into the early stage. A loan only lowers the early cost; it does not guarantee the project&apos;s own profitability. The lower the threshold for early money, the greater the risk that more sites stall later — at the sales stage — for lack of feasibility." data-ko="다만 과열을 경계할 필요도 있다. 연 1%라는 조건은 사업성이 충분히 검증되지 않은 사업장까지 초기 단계로 진입시킬 수 있다. 융자는 초기 비용을 낮춰줄 뿐, 사업 자체의 수익성을 보장하지 않는다. 초기 자금의 문턱이 낮아질수록, 정작 분양 단계에서 사업성이 부족해 멈추는 사업장이 늘어날 위험도 함께 커진다.">다만 과열을 경계할 필요도 있다. 연 1%라는 조건은 사업성이 충분히 검증되지 않은 사업장까지 초기 단계로 진입시킬 수 있다. 융자는 초기 비용을 낮춰줄 뿐, 사업 자체의 수익성을 보장하지 않는다. 초기 자금의 문턱이 낮아질수록, 정작 분양 단계에서 사업성이 부족해 멈추는 사업장이 늘어날 위험도 함께 커진다.</p>
<div class="editor-note">
<h3 data-en="Editor&apos;s Note" data-ko="편집장 코멘트">편집장 코멘트</h3>
<p data-en="For ARCHINODE, this trend reframes the &apos;timing of demand.&apos; The sites taking early loans now are where the materials demand ARCHINODE connects will arrive two to three years later. The brands that grasp the lag — from early loan to groundbreaking to finishing-material orders — rather than chasing near-term sales figures, are the ones that catch the timing in Korea&apos;s redevelopment market. Right now is a season for observation, not selling." data-ko="ARCHINODE 입장에서 이 흐름은 &apos;수요의 시점&apos;을 다시 보게 한다. 지금 초기 융자를 받는 사업장은 ARCHINODE가 연결하는 자재 수요가 2–3년 뒤 도착할 곳이다. 단기 매출 지표가 아니라, 초기 융자 → 착공 → 마감재 발주로 이어지는 시차를 이해하는 브랜드가 한국 정비사업 시장에서 타이밍을 잡는다. 지금은 영업이 아니라 관찰의 시기다.">ARCHINODE 입장에서 이 흐름은 '수요의 시점'을 다시 보게 한다. 지금 초기 융자를 받는 사업장은 ARCHINODE가 연결하는 자재 수요가 2–3년 뒤 도착할 곳이다. 단기 매출 지표가 아니라, 초기 융자 → 착공 → 마감재 발주로 이어지는 시차를 이해하는 브랜드가 한국 정비사업 시장에서 타이밍을 잡는다. 지금은 영업이 아니라 관찰의 시기다.</p>
</div>
