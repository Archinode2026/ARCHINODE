    <h1 data-en="Now Private Buildings Must Prove “Zero Energy” Too" data-ko="이제 민간 건물도 &apos;제로에너지&apos;를 증명해야 한다">이제 민간 건물도 '제로에너지'를 증명해야 한다</h1>
    <p class="subtitle" data-en="Zero-energy building certification moves beyond the public sector — a new baseline for buildings over 1,000㎡." data-ko="제로에너지 건축물 인증이 공공을 넘어 민간으로 — 연면적 1,000㎡ 이상 건물이 맞닥뜨린 새 기준선.">제로에너지 건축물 인증이 공공을 넘어 민간으로 — 연면적 1,000㎡ 이상 건물이 맞닥뜨린 새 기준선.</p>
    <div class="meta">2026-06-15 <span>·</span> ARCHINODE Editorial</div>
</section>
<article class="article-body">
<p class="lead" data-en="Zero-energy building (ZEB) certification has crossed the public-sector fence. The mandate that began with public buildings in 2020 started applying, from December 2025, to private buildings over 1,000㎡ of floor area. By turning a building&apos;s energy performance from something &apos;recommended&apos; into something that must be &apos;proven,&apos; this shift puts quiet but unmistakable pressure on architects, contractors, and the entire materials supply chain." data-ko="제로에너지 건축물(ZEB) 의무화가 공공의 울타리를 넘었다. 2020년 공공 건축물에서 출발한 인증 의무가, 2025년 12월부터는 연면적 1,000㎡ 이상 민간 건축물에까지 적용되기 시작했다. 건물의 에너지 성능을 &apos;권장&apos;이 아니라 &apos;증명&apos;의 대상으로 바꾼 이 변화는, 설계사무소와 시공사, 그리고 자재 공급망 전체에 조용하지만 분명한 압력을 가하고 있다.">제로에너지 건축물(ZEB) 의무화가 공공의 울타리를 넘었다. 2020년 공공 건축물에서 출발한 인증 의무가, 2025년 12월부터는 연면적 1,000㎡ 이상 민간 건축물에까지 적용되기 시작했다. 건물의 에너지 성능을 '권장'이 아니라 '증명'의 대상으로 바꾼 이 변화는, 설계사무소와 시공사, 그리고 자재 공급망 전체에 조용하지만 분명한 압력을 가하고 있다.</p>
<h2 data-en="From Recommended to Required, From Public to Private" data-ko="권장에서 의무로, 공공에서 민간으로">권장에서 의무로, 공공에서 민간으로</h2>
<p data-en="ZEB certification has expanded in stages. It began in 2020 with new public buildings over 1,000㎡, then widened in 2023 to public buildings over 500㎡ and public apartment complexes of 30 or more units. With this revision, the private sector enters the mandate for the first time. According to a Korea Policy Briefing, private buildings over 1,000㎡ must secure energy performance at the ZEB Grade 5 level, applied from December 2025." data-ko="ZEB 인증은 단계적으로 확대돼 왔다. 2020년 연면적 1,000㎡ 이상 신축 공공 건축물에서 시작해, 2023년에는 연면적 500㎡ 이상 공공 건축물과 30세대 이상 공공 공동주택으로 범위를 넓혔다. 그리고 이번 개정으로 민간 영역이 처음으로 의무화 대상에 들어왔다. 대한민국 정책브리핑에 따르면, 연면적 1,000㎡ 이상 민간 건축물도 ZEB 5등급 수준의 에너지 성능을 확보하도록 하는 기준이 2025년 12월부터 적용된다.">ZEB 인증은 단계적으로 확대돼 왔다. 2020년 연면적 1,000㎡ 이상 신축 공공 건축물에서 시작해, 2023년에는 연면적 500㎡ 이상 공공 건축물과 30세대 이상 공공 공동주택으로 범위를 넓혔다. 그리고 이번 개정으로 민간 영역이 처음으로 의무화 대상에 들어왔다. 대한민국 정책브리핑에 따르면, 연면적 1,000㎡ 이상 민간 건축물도 ZEB 5등급 수준의 에너지 성능을 확보하도록 하는 기준이 2025년 12월부터 적용된다.</p>
<p data-en="The key is the &apos;Grade 5&apos; starting line. ZEB grades run from Grade 1 (energy self-sufficiency of 100% or more) down to Grade 5 (20% to under 40%). Grade 5 is the lowest tier, but its significance lies in being applied uniformly across private buildings. Insulation, glazing, and ventilation performance — until now &apos;nice to have&apos; — have become a condition for clearing the permit." data-ko="핵심은 &apos;5등급&apos;이라는 출발선이다. ZEB 등급은 에너지 자립률에 따라 1등급(100% 이상)부터 5등급(20% 이상 40% 미만)까지 나뉜다. 5등급은 가장 낮은 단계지만, 민간 건축물 전반에 일률적으로 적용된다는 점에서 의미가 다르다. 지금까지 &apos;하면 좋은 것&apos;이었던 단열·창호·환기 성능이, 이제는 인허가의 통과 조건이 된 것이다.">핵심은 '5등급'이라는 출발선이다. ZEB 등급은 에너지 자립률에 따라 1등급(100% 이상)부터 5등급(20% 이상 40% 미만)까지 나뉜다. 5등급은 가장 낮은 단계지만, 민간 건축물 전반에 일률적으로 적용된다는 점에서 의미가 다르다. 지금까지 '하면 좋은 것'이었던 단열·창호·환기 성능이, 이제는 인허가의 통과 조건이 된 것이다.</p>
<figure><img src="../assets/magazine/placeholders/construction.svg" alt="에너지 성능이 선택 사양에서 인허가 조건으로 이동한다 (이미지: Unsplash)"><figcaption data-en="Energy performance moves from option to permit condition (Image: Unsplash)" data-ko="에너지 성능이 선택 사양에서 인허가 조건으로 이동한다 (이미지: Unsplash)">에너지 성능이 선택 사양에서 인허가 조건으로 이동한다 (이미지: Unsplash)</figcaption></figure>
<h2 data-en="A Signal Reaching the Materials Market" data-ko="자재 시장에 도착한 신호">자재 시장에 도착한 신호</h2>
<p data-en="The first place this change lands is the building envelope. Demand for high-performance insulation, Low-E triple glazing, airtightness materials, and thermal-bridge-blocking components now arises structurally, right at the permit stage. When a product category shifts from &apos;optional&apos; to &apos;standard,&apos; the sheer volume of the market changes." data-ko="이 변화가 가장 먼저 닿는 곳은 외피(envelope) 자재다. 고성능 단열재, 로이(Low-E) 삼중창, 기밀 시공 자재, 그리고 열교(thermal bridge)를 차단하는 부자재의 수요가 인허가 단계에서부터 구조적으로 발생한다. &apos;선택 사양&apos;이던 제품군이 &apos;기본 사양&apos;으로 이동하면, 시장의 부피 자체가 달라진다.">이 변화가 가장 먼저 닿는 곳은 외피(envelope) 자재다. 고성능 단열재, 로이(Low-E) 삼중창, 기밀 시공 자재, 그리고 열교(thermal bridge)를 차단하는 부자재의 수요가 인허가 단계에서부터 구조적으로 발생한다. '선택 사양'이던 제품군이 '기본 사양'으로 이동하면, 시장의 부피 자체가 달라진다.</p>
<blockquote data-en="“The moment energy performance turns from a recommendation into a permit condition, choosing materials stops being a matter of taste and becomes a matter of passing.”" data-ko="“에너지 성능이 권장에서 인허가 조건으로 바뀌는 순간, 자재 선택은 취향의 문제가 아니라 통과의 문제가 된다.”">“에너지 성능이 권장에서 인허가 조건으로 바뀌는 순간, 자재 선택은 취향의 문제가 아니라 통과의 문제가 된다.”</blockquote>
<p data-en="The burden on the field is just as clear, though. The extra construction cost to reach Grade 5, the time and cost of the certification process, and the workload of factoring energy analysis in from the earliest design stage all concentrate on small architecture firms and small developers. The intent of the mandate is right; how that cost is distributed, and to whom, is a separate question." data-ko="다만 현장의 부담도 분명하다. 5등급을 맞추기 위한 추가 공사비, 인증 절차에 드는 시간과 비용, 그리고 설계 초기 단계에서부터 에너지 해석을 반영해야 하는 업무 부하가 중소 설계사무소와 소규모 시행사에 집중된다. 의무화의 취지는 옳지만, 그 비용이 누구에게 어떻게 분산되느냐는 별개의 문제다.">다만 현장의 부담도 분명하다. 5등급을 맞추기 위한 추가 공사비, 인증 절차에 드는 시간과 비용, 그리고 설계 초기 단계에서부터 에너지 해석을 반영해야 하는 업무 부하가 중소 설계사무소와 소규모 시행사에 집중된다. 의무화의 취지는 옳지만, 그 비용이 누구에게 어떻게 분산되느냐는 별개의 문제다.</p>
<h2 data-en="A Critical Reading" data-ko="비판적으로 본다면">비판적으로 본다면</h2>
<p data-en="There is a point worth flagging. Grade 5 sits at roughly the 20% self-sufficiency line, and some assess its real carbon-reduction effect as limited — a gap between the &apos;symbolism&apos; and the &apos;effectiveness&apos; of the mandate. There is also a risk that certification stops at meeting Grade 5 on paper and never connects to verifying actual performance after completion, becoming &apos;certification for certification&apos;s sake.&apos; For the system to truly work, the decisive question is how to close the gap between design-stage certification and measured post-completion performance." data-ko="짚어야 할 지점이 있다. 5등급은 에너지 자립률 20% 선으로, 실질적인 탄소 감축 효과는 제한적이라는 평가가 나온다. 의무화의 &apos;상징성&apos;과 &apos;실효성&apos; 사이에 간극이 있다는 것이다. 또한 인증이 서류상의 5등급을 맞추는 데 그치고 준공 후 실제 성능 검증으로 이어지지 않는다면, &apos;인증을 위한 인증&apos;이 될 위험도 있다. 제도가 진짜 효과를 내려면, 설계 단계 인증과 준공 후 실측 성능의 간극을 어떻게 메우느냐가 관건이다.">짚어야 할 지점이 있다. 5등급은 에너지 자립률 20% 선으로, 실질적인 탄소 감축 효과는 제한적이라는 평가가 나온다. 의무화의 '상징성'과 '실효성' 사이에 간극이 있다는 것이다. 또한 인증이 서류상의 5등급을 맞추는 데 그치고 준공 후 실제 성능 검증으로 이어지지 않는다면, '인증을 위한 인증'이 될 위험도 있다. 제도가 진짜 효과를 내려면, 설계 단계 인증과 준공 후 실측 성능의 간극을 어떻게 메우느냐가 관건이다.</p>
<div class="editor-note">
<h3 data-en="Editor&apos;s Note" data-ko="편집장 코멘트">편집장 코멘트</h3>
<p data-en="For ARCHINODE, this mandate is a clear opportunity signal. For global brands handling high-performance insulation, glazing, and airtightness materials, the Korean market has shifted from a &apos;recommendation market&apos; to a &apos;mandate market.&apos; Test reports and data proving a certification grade now double as sales material. The next task at the platform level is to organize &apos;energy performance data&apos; so listed brands can present their ZEB contribution quantitatively." data-ko="ARCHINODE 입장에서 이 의무화는 명확한 기회 신호다. 고성능 단열·창호·기밀 자재를 다루는 글로벌 브랜드에게 한국 시장은 &apos;권장 시장&apos;에서 &apos;의무 시장&apos;으로 바뀌었다. 인증 등급을 입증하는 시험 성적서와 데이터가 곧 영업 자료가 되는 구조다. 입점 브랜드가 자사 제품의 ZEB 기여도를 정량적으로 제시할 수 있도록, 플랫폼 차원의 &apos;에너지 성능 데이터&apos; 정리가 다음 과제가 된다.">ARCHINODE 입장에서 이 의무화는 명확한 기회 신호다. 고성능 단열·창호·기밀 자재를 다루는 글로벌 브랜드에게 한국 시장은 '권장 시장'에서 '의무 시장'으로 바뀌었다. 인증 등급을 입증하는 시험 성적서와 데이터가 곧 영업 자료가 되는 구조다. 입점 브랜드가 자사 제품의 ZEB 기여도를 정량적으로 제시할 수 있도록, 플랫폼 차원의 '에너지 성능 데이터' 정리가 다음 과제가 된다.</p>
</div>
