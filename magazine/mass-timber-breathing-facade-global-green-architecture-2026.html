    <h1 data-en="Wood Is Rebuilding the City" data-ko="나무가 도시를 다시 짓는다">나무가 도시를 다시 짓는다</h1>
    <p class="subtitle" data-en="From Vienna to Vancouver, mass timber and breathing façades are pushing green architecture into its next chapter — but how much of it is real?" data-ko="비엔나에서 밴쿠버까지, 매스팀버와 숨쉬는 파사드가 친환경 건축을 다음 단계로 밀어올린다 — 그런데 그중 진짜는 얼마일까?">비엔나에서 밴쿠버까지, 매스팀버와 숨쉬는 파사드가 친환경 건축을 다음 단계로 밀어올린다 — 그런데 그중 진짜는 얼마일까?</p>
    <div class="meta">2026-05-27 <span>·</span> ARCHINODE Editorial</div>
</section>
<article class="article-body">
<p class="lead" data-en="Tall timber buildings, once a niche experiment, now shape skylines from Vienna to Vancouver. At the same time, building skins are turning into living organs — façades that breathe, filter air, and store carbon. 2026&apos;s green architecture is no longer about adding a solar panel after the fact; it is about making the structure and the skin themselves do the environmental work. The question for the materials industry is which of these moves is real performance and which is a marketing label." data-ko="한때 틈새 실험이던 고층 목조 건물이 이제 비엔나에서 밴쿠버까지 스카이라인을 그린다. 동시에 건물의 외피는 살아 있는 장기처럼 변하고 있다 — 숨을 쉬고, 공기를 거르고, 탄소를 저장하는 파사드(건물 외벽)다. 2026년의 친환경 건축은 더 이상 다 지은 뒤 태양광 패널을 얹는 일이 아니다. 구조체와 외피 자체가 환경적 일을 하도록 만드는 것이다. 자재 산업이 던져야 할 질문은 이 중 무엇이 진짜 성능이고 무엇이 마케팅 라벨인가다.">한때 틈새 실험이던 고층 목조 건물이 이제 비엔나에서 밴쿠버까지 스카이라인을 그린다. 동시에 건물의 외피는 살아 있는 장기처럼 변하고 있다 — 숨을 쉬고, 공기를 거르고, 탄소를 저장하는 파사드(건물 외벽)다. 2026년의 친환경 건축은 더 이상 다 지은 뒤 태양광 패널을 얹는 일이 아니다. 구조체와 외피 자체가 환경적 일을 하도록 만드는 것이다. 자재 산업이 던져야 할 질문은 이 중 무엇이 진짜 성능이고 무엇이 마케팅 라벨인가다.</p>

<h2 data-en="Mass Timber: From Niche to Skyline" data-ko="매스팀버 — 틈새에서 스카이라인으로">매스팀버 — 틈새에서 스카이라인으로</h2>
<p data-en="Mass timber — engineered wood like CLT (cross-laminated timber) — is moving from experimental projects into mainstream urban construction as building codes evolve to permit taller wooden structures. Sweden&apos;s Sara Cultural Centre, at nearly 80 meters and 20 stories, is one of Europe&apos;s tallest wooden buildings, built with timber sourced from forests within a 60-kilometer radius. That short supply radius matters: a building&apos;s lowest carbon footprint comes not only from the material but from how far it traveled. This is the same direction Korea took with its seven-story timber projects — but globally the scale is already an order of magnitude larger." data-ko="매스팀버, 즉 CLT(직교집성판) 같은 엔지니어드 우드(공학 목재)는 더 높은 목조를 허용하는 방향으로 건축 법규가 진화하면서 실험적 프로젝트에서 주류 도시 건축으로 옮겨가고 있다. 스웨덴의 사라 문화센터(Sara Cultural Centre)는 약 80m 높이 20층으로 유럽에서 가장 높은 목조 건물 중 하나이며, 현장 반경 60km 이내 숲에서 조달한 목재로 지어졌다. 이 짧은 공급 반경이 핵심이다. 건물의 가장 낮은 탄소발자국은 소재 자체뿐 아니라 그 소재가 얼마나 멀리서 왔는가에서 갈린다. 한국이 7층 목조 프로젝트로 향한 방향과 같지만, 글로벌 규모는 이미 한 자릿수 위에 있다.">매스팀버, 즉 CLT(직교집성판) 같은 엔지니어드 우드(공학 목재)는 더 높은 목조를 허용하는 방향으로 건축 법규가 진화하면서 실험적 프로젝트에서 주류 도시 건축으로 옮겨가고 있다. 스웨덴의 사라 문화센터(Sara Cultural Centre)는 약 80m 높이 20층으로 유럽에서 가장 높은 목조 건물 중 하나이며, 현장 반경 60km 이내 숲에서 조달한 목재로 지어졌다. 이 짧은 공급 반경이 핵심이다. 건물의 가장 낮은 탄소발자국은 소재 자체뿐 아니라 그 소재가 얼마나 멀리서 왔는가에서 갈린다. 한국이 7층 목조 프로젝트로 향한 방향과 같지만, 글로벌 규모는 이미 한 자릿수 위에 있다.</p>
<figure><img src="../assets/magazine/placeholders/design.svg" alt="목조 구조가 드러난 건축물 내부"><figcaption data-en="Mass timber stores carbon in the structure itself — but only if the lifecycle accounting holds up (Image: Unsplash)" data-ko="매스팀버는 구조체 자체에 탄소를 저장한다 — 단, 전생애 회계가 성립할 때만 (이미지: Unsplash)">매스팀버는 구조체 자체에 탄소를 저장한다 — 단, 전생애 회계가 성립할 때만 (이미지: Unsplash)</figcaption></figure>

<h2 data-en="When Does Green Count as Real?" data-ko="언제 친환경은 진짜가 되는가">언제 친환경은 진짜가 되는가</h2>
<p data-en="Here a sustainability lens is essential. Mass timber is praised for &apos;storing carbon,&apos; and it does — wood holds the carbon a tree absorbed while growing. But that ledger only balances under conditions: the forest must be sustainably managed and replanted, transport distance kept short, and the wood must not be incinerated at end of life. Carbon-negative materials make the case sharper. Hempcrete — a biocomposite of hemp hurd, lime, and water — sequesters roughly 110 kg of CO₂ per cubic meter as the plant grows, and keeps absorbing CO₂ as the lime binder cures. Numbers like these are what separate certified performance under frameworks like G-SEED (Korea&apos;s green building certification), LEED, or an EPD (environmental product declaration) from a vague &apos;eco-friendly&apos; sticker." data-ko="여기서 지속가능성의 시선이 꼭 필요하다. 매스팀버는 &apos;탄소를 저장한다&apos;고 칭송받고, 실제로 그렇다 — 나무가 자라며 흡수한 탄소를 목재가 붙들고 있다. 그러나 이 회계는 조건이 맞아야만 성립한다. 숲이 지속가능하게 관리·재조림되어야 하고, 운송 거리가 짧아야 하며, 수명이 다한 목재를 소각하지 않아야 한다. 탄소 마이너스(흡수형) 소재를 보면 논점이 더 선명해진다. 헴프크리트(대마 줄기·석회·물의 바이오 복합재)는 식물이 자라는 동안 1㎥당 약 110kg의 CO₂를 격리하고, 석회 바인더가 굳는 동안에도 계속 CO₂를 흡수한다. 이런 수치야말로 G-SEED(녹색건축인증), LEED, EPD(환경성적표지) 같은 인증된 성능과, 막연한 &apos;친환경&apos; 스티커를 가르는 기준이다.">여기서 지속가능성의 시선이 꼭 필요하다. 매스팀버는 '탄소를 저장한다'고 칭송받고, 실제로 그렇다 — 나무가 자라며 흡수한 탄소를 목재가 붙들고 있다. 그러나 이 회계는 조건이 맞아야만 성립한다. 숲이 지속가능하게 관리·재조림되어야 하고, 운송 거리가 짧아야 하며, 수명이 다한 목재를 소각하지 않아야 한다. 탄소 마이너스(흡수형) 소재를 보면 논점이 더 선명해진다. 헴프크리트(대마 줄기·석회·물의 바이오 복합재)는 식물이 자라는 동안 1㎥당 약 110kg의 CO₂를 격리하고, 석회 바인더가 굳는 동안에도 계속 CO₂를 흡수한다. 이런 수치야말로 G-SEED(녹색건축인증), LEED, EPD(환경성적표지) 같은 인증된 성능과, 막연한 '친환경' 스티커를 가르는 기준이다.</p>
<blockquote data-en="&quot;A material isn&apos;t green because it&apos;s natural. It&apos;s green when its whole-life carbon — production, transport, use, disposal — actually adds up to less.&quot;" data-ko="&quot;소재는 천연이라서 친환경인 게 아니다. 생산·운송·사용·폐기 전생애 탄소가 실제로 더 적게 나올 때 친환경이다.&quot;">"소재는 천연이라서 친환경인 게 아니다. 생산·운송·사용·폐기 전생애 탄소가 실제로 더 적게 나올 때 친환경이다."</blockquote>

<h2 data-en="The Façade That Breathes" data-ko="숨을 쉬는 파사드">숨을 쉬는 파사드</h2>
<p data-en="The skin is changing too. Foster + Partners designed Bloomberg&apos;s European HQ in London with a &apos;breathing&apos; façade — automated bronze louvers that open and close for natural ventilation, which combined with a central atrium cut energy use by about 35 percent. Further out on the curve, façades are being engineered as biofilters: algae-filled bioreactors and moss-covered panels that actively absorb pollutants like nitrogen dioxide and VOCs, converting them into biomass. Two years ago these were biennale showpieces; now they appear in working office towers. The trajectory is clear — over the next one to three years, the &apos;active envelope&apos; moves from icon projects toward standard high-spec commercial buildings." data-ko="외피도 바뀌고 있다. 포스터+파트너스(Foster + Partners)는 런던 블룸버그 유럽 본사를 &apos;숨쉬는&apos; 파사드로 설계했다 — 자동으로 여닫히며 자연 환기를 만드는 청동 루버(louver, 가동 차양)로, 중앙 아트리움과 결합해 에너지 사용을 약 35% 줄였다. 더 앞선 곡선에서는 파사드가 바이오필터(생물 여과)로 설계된다. 조류(藻類)를 채운 바이오리액터, 이끼로 덮인 패널이 이산화질소와 휘발성유기화합물(VOC) 같은 오염물질을 능동적으로 흡수해 바이오매스로 바꾼다. 2년 전 비엔날레 전시품이던 것이 지금은 실제 오피스 타워에 등장한다. 방향은 분명하다 — 앞으로 1~3년 사이 &apos;능동형 외피&apos;는 아이콘 프로젝트에서 고사양 상업 건물의 표준 쪽으로 이동한다.">외피도 바뀌고 있다. 포스터+파트너스(Foster + Partners)는 런던 블룸버그 유럽 본사를 '숨쉬는' 파사드로 설계했다 — 자동으로 여닫히며 자연 환기를 만드는 청동 루버(louver, 가동 차양)로, 중앙 아트리움과 결합해 에너지 사용을 약 35% 줄였다. 더 앞선 곡선에서는 파사드가 바이오필터(생물 여과)로 설계된다. 조류(藻類)를 채운 바이오리액터, 이끼로 덮인 패널이 이산화질소와 휘발성유기화합물(VOC) 같은 오염물질을 능동적으로 흡수해 바이오매스로 바꾼다. 2년 전 비엔날레 전시품이던 것이 지금은 실제 오피스 타워에 등장한다. 방향은 분명하다 — 앞으로 1~3년 사이 '능동형 외피'는 아이콘 프로젝트에서 고사양 상업 건물의 표준 쪽으로 이동한다.</p>

<h2 data-en="Where Does Korea Stand?" data-ko="한국은 어디쯤 있는가">한국은 어디쯤 있는가</h2>
<p data-en="Korea has the pieces — seven-story timber projects, an active G-SEED certification system, and a materials industry that already exports low-carbon products. What it has less of, for now, is the tall-timber code framework and the showcase active-envelope buildings that Europe uses to pull the whole market forward. The global signal is not &apos;wood is trendy.&apos; It is that structure and skin are becoming carbon instruments — and the buildings that win certification, financing, and tenants will increasingly be the ones that can prove it with numbers." data-ko="한국은 조각들을 갖고 있다 — 7층 목조 프로젝트, 작동 중인 G-SEED 인증 체계, 그리고 이미 저탄소 제품을 수출하는 자재 산업. 아직 부족한 것은, 유럽이 시장 전체를 끌어당기는 데 쓰는 고층 목조 법규 체계와 능동형 외피의 쇼케이스 건물이다. 글로벌 신호는 &apos;나무가 유행이다&apos;가 아니다. 구조체와 외피가 탄소를 다루는 장치가 되고 있다는 것 — 그리고 인증·금융·임차인을 따내는 건물은 점점 더 그것을 숫자로 증명할 수 있는 건물이 된다는 것이다.">한국은 조각들을 갖고 있다 — 7층 목조 프로젝트, 작동 중인 G-SEED 인증 체계, 그리고 이미 저탄소 제품을 수출하는 자재 산업. 아직 부족한 것은, 유럽이 시장 전체를 끌어당기는 데 쓰는 고층 목조 법규 체계와 능동형 외피의 쇼케이스 건물이다. 글로벌 신호는 '나무가 유행이다'가 아니다. 구조체와 외피가 탄소를 다루는 장치가 되고 있다는 것 — 그리고 인증·금융·임차인을 따내는 건물은 점점 더 그것을 숫자로 증명할 수 있는 건물이 된다는 것이다.</p>

<div class="editor-note">
<h3 data-en="Editor&apos;s Note" data-ko="편집장 코멘트">편집장 코멘트</h3>
<p data-en="For ARCHINODE, the takeaway is to treat &apos;green&apos; as a number, not an adjective. Brands that can attach an EPD, a G-SEED contribution, or a verified carbon figure to their material will have a structural edge as active envelopes and mass timber go mainstream. The platform&apos;s job is to make those numbers visible and comparable — so a buyer can tell carbon-storing CLT from a sticker, and a breathing façade from a brochure render. In green building, transparency is the product." data-ko="ARCHINODE 입장에서 핵심은 &apos;친환경&apos;을 형용사가 아니라 숫자로 다루는 것이다. EPD, G-SEED 기여도, 검증된 탄소 수치를 자기 소재에 붙일 수 있는 브랜드는 능동형 외피와 매스팀버가 주류가 될수록 구조적 우위를 갖는다. 플랫폼의 역할은 그 숫자를 보이게, 비교 가능하게 만드는 것이다 — 그래야 구매자가 탄소를 저장하는 CLT와 스티커를, 숨쉬는 파사드와 브로슈어 렌더링을 구별할 수 있다. 친환경 건축에서 투명성은 그 자체가 제품이다.">ARCHINODE 입장에서 핵심은 '친환경'을 형용사가 아니라 숫자로 다루는 것이다. EPD, G-SEED 기여도, 검증된 탄소 수치를 자기 소재에 붙일 수 있는 브랜드는 능동형 외피와 매스팀버가 주류가 될수록 구조적 우위를 갖는다. 플랫폼의 역할은 그 숫자를 보이게, 비교 가능하게 만드는 것이다 — 그래야 구매자가 탄소를 저장하는 CLT와 스티커를, 숨쉬는 파사드와 브로슈어 렌더링을 구별할 수 있다. 친환경 건축에서 투명성은 그 자체가 제품이다.</p>
