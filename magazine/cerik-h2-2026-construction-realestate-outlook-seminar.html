    <h1 data-en="On June 18, the Industry Asks: Is This a Turning Point?" data-ko="6월 18일, 업계가 묻는다 — 지금이 변곡점인가">6월 18일, 업계가 묻는다 — 지금이 변곡점인가</h1>
    <p class="subtitle" data-en="CERIK convenes its second-half outlook seminar on construction and real estate. The real question underneath: is the market merely cycling, or structurally re-forming?" data-ko="한국건설산업연구원이 하반기 건설·부동산 경기 전망 세미나를 연다. 그 밑에 깔린 질문 — 시장은 순환 중인가, 구조적으로 재편되는 중인가.">한국건설산업연구원이 하반기 건설·부동산 경기 전망 세미나를 연다. 그 밑에 깔린 질문 — 시장은 순환 중인가, 구조적으로 재편되는 중인가.</p>
    <div class="meta">2026-06-17 <span>·</span> ARCHINODE Editorial</div>
</section>
<article class="article-body">
<p class="lead" data-en="June 18, 2026. The eyes of the construction and real estate market turn to the Construction Hall in Gangnam, Seoul, where the Korea Research Institute for Construction Industry (CERIK) holds a large seminar on the second-half outlook. On the surface it looks like a familiar annual event. But this year&apos;s question is different. It asks whether today&apos;s slump is a cyclical trough that one rate cut would unfreeze — or a structural turning point where the supply system, the financing environment, and the policy stance are all shifting at once." data-ko="2026년 6월 18일, 서울 강남구 건설회관에 건설·부동산 시장의 시선이 모인다. 한국건설산업연구원(CERIK)이 하반기 경기 전망을 주제로 대규모 세미나를 연다. 표면적으로는 익숙한 연례 행사처럼 보인다. 그러나 올해의 질문은 조금 다르다. 지금의 침체가 금리 한 번 내리면 풀리는 경기 순환의 골인지, 아니면 공급 체계·금융 환경·정책 기조가 한꺼번에 바뀌는 구조적 변곡점인지를 묻고 있기 때문이다.">2026년 6월 18일, 서울 강남구 건설회관에 건설·부동산 시장의 시선이 모인다. 한국건설산업연구원(CERIK)이 하반기 경기 전망을 주제로 대규모 세미나를 연다. 표면적으로는 익숙한 연례 행사처럼 보인다. 그러나 올해의 질문은 조금 다르다. 지금의 침체가 금리 한 번 내리면 풀리는 경기 순환의 골인지, 아니면 공급 체계·금융 환경·정책 기조가 한꺼번에 바뀌는 구조적 변곡점인지를 묻고 있기 때문이다.</p>
<h2 data-en="Two Reports, Two Halves of the Same Market" data-ko="두 개의 발표, 한 시장의 두 얼굴">두 개의 발표, 한 시장의 두 얼굴</h2>
<p data-en="The agenda splits the market in two. Senior researcher Lee Ji-hye takes the construction-business outlook, examining how the order environment is changing and how the efficiency of construction investment can be raised. The industry faces a tangle of pressures at once — rising costs and a labor-supply crunch — and building an efficient management system to break through them has become urgent. Senior researcher Kim Seong-hwan takes housing and real estate, reading the volatility of asset values and whether transactions will revive, and analyzing how macro indicators like interest rates and household debt ripple into property." data-ko="발표 구성부터 시장을 둘로 가른다. 이지혜 연구위원은 하반기 건설경기 전망을 맡아 수주 환경의 변화와 건설 투자의 효율성 제고 방안을 다룬다. 건설업계는 원가 상승과 인력 수급 문제라는 복합적 압박에 동시에 직면해 있고, 이를 타개할 효율적 관리 체계 구축이 시급한 상황이다. 김성환 연구위원은 주택·부동산을 맡아 자산 가치의 변동성과 거래 활성화 여부를 진단하고, 금리·가계부채 같은 거시 지표가 부동산에 미치는 파급 효과를 분석한다.">발표 구성부터 시장을 둘로 가른다. 이지혜 연구위원은 하반기 건설경기 전망을 맡아 수주 환경의 변화와 건설 투자의 효율성 제고 방안을 다룬다. 건설업계는 원가 상승과 인력 수급 문제라는 복합적 압박에 동시에 직면해 있고, 이를 타개할 효율적 관리 체계 구축이 시급한 상황이다. 김성환 연구위원은 주택·부동산을 맡아 자산 가치의 변동성과 거래 활성화 여부를 진단하고, 금리·가계부채 같은 거시 지표가 부동산에 미치는 파급 효과를 분석한다.</p>
<figure><img src="../assets/magazine/placeholders/construction.svg" alt="한쪽엔 원가와 인력, 다른 한쪽엔 금리와 부채 — 세미나는 시장의 두 절반을 동시에 읽는다 (이미지: Unsplash)"><figcaption data-en="Costs and labor on one side, rates and debt on the other — the seminar reads both halves of the market (Image: Unsplash)" data-ko="한쪽엔 원가와 인력, 다른 한쪽엔 금리와 부채 — 세미나는 시장의 두 절반을 동시에 읽는다 (이미지: Unsplash)">한쪽엔 원가와 인력, 다른 한쪽엔 금리와 부채 — 세미나는 시장의 두 절반을 동시에 읽는다 (이미지: Unsplash)</figcaption></figure>
<p data-en="CERIK frames the core goal plainly: to inspect the market comprehensively from the viewpoint of a structural change in which the supply system, the financing environment, and the policy stance are combined. In other words, this is not a simple forecast of next quarter&apos;s numbers, but an attempt to diagnose the constitution of the industry itself. The seminar is open — anyone interested in the construction and real estate market may attend without prior registration, a choice the institute presents as a commitment to transparency." data-ko="CERIK는 이번 세미나의 핵심 목표를 분명히 한다. 공급 체계와 금융 환경, 정책 기조가 결합한 구조적 변화의 관점에서 시장을 종합적으로 점검하겠다는 것이다. 다시 말해 다음 분기의 숫자를 단순 예측하는 자리가 아니라, 산업 자체의 체질을 진단하려는 시도다. 세미나는 사전 신청 절차 없이 건설·부동산 시장에 관심 있는 시민 누구나 참석할 수 있도록 개방 운영되며, 연구원은 이를 정보 투명성에 대한 의지로 설명한다.">CERIK는 이번 세미나의 핵심 목표를 분명히 한다. 공급 체계와 금융 환경, 정책 기조가 결합한 구조적 변화의 관점에서 시장을 종합적으로 점검하겠다는 것이다. 다시 말해 다음 분기의 숫자를 단순 예측하는 자리가 아니라, 산업 자체의 체질을 진단하려는 시도다. 세미나는 사전 신청 절차 없이 건설·부동산 시장에 관심 있는 시민 누구나 참석할 수 있도록 개방 운영되며, 연구원은 이를 정보 투명성에 대한 의지로 설명한다.</p>
<h2 data-en="What a Forecast Can — and Cannot — Promise" data-ko="전망이 약속할 수 있는 것, 없는 것">전망이 약속할 수 있는 것, 없는 것</h2>
<p data-en="A critic would note the limits up front. Outlook seminars lean on statistical models, but the variables that actually move the market — geopolitical risk, abrupt policy reversals, a credit event — are precisely the ones models capture worst. Leaning on data alone can lull the audience into false precision. The honest reading is that a forecast narrows uncertainty; it does not abolish it. Its value is not in calling the bottom to the month, but in easing the information asymmetry between large players who already model the market and smaller firms and end-users who do not." data-ko="비판적으로 보면 한계부터 짚어야 한다. 전망 세미나는 통계 모델에 기댄다. 그러나 실제로 시장을 움직이는 변수 — 지정학적 리스크, 급격한 정책 반전, 신용 이벤트 — 는 모델이 가장 못 잡는 영역이다. 데이터에만 의존하면 청중을 가짜 정밀함에 빠뜨릴 수 있다. 정직한 독법은 이렇다. 전망은 불확실성을 줄일 뿐, 없애지 못한다. 그 가치는 바닥을 월 단위로 맞히는 데 있지 않다. 이미 시장을 모델링하는 대형 플레이어와, 그렇지 못한 중소 업체·실수요자 사이의 정보 비대칭을 줄이는 데 있다.">비판적으로 보면 한계부터 짚어야 한다. 전망 세미나는 통계 모델에 기댄다. 그러나 실제로 시장을 움직이는 변수 — 지정학적 리스크, 급격한 정책 반전, 신용 이벤트 — 는 모델이 가장 못 잡는 영역이다. 데이터에만 의존하면 청중을 가짜 정밀함에 빠뜨릴 수 있다. 정직한 독법은 이렇다. 전망은 불확실성을 줄일 뿐, 없애지 못한다. 그 가치는 바닥을 월 단위로 맞히는 데 있지 않다. 이미 시장을 모델링하는 대형 플레이어와, 그렇지 못한 중소 업체·실수요자 사이의 정보 비대칭을 줄이는 데 있다.</p>
<blockquote data-en="&quot;A forecast does not abolish uncertainty. Its worth is in narrowing the information gap between those who can model the market and those who cannot.&quot;" data-ko="&quot;전망은 불확실성을 없애지 못한다. 그 가치는 시장을 모델링할 수 있는 쪽과 그렇지 못한 쪽의 정보 격차를 좁히는 데 있다.&quot;">"전망은 불확실성을 없애지 못한다. 그 가치는 시장을 모델링할 수 있는 쪽과 그렇지 못한 쪽의 정보 격차를 좁히는 데 있다."</blockquote>
<h2 data-en="From the Field: Costs, Labor, and the Word &apos;Structural&apos;" data-ko="현장에서 본 &apos;구조적&apos;이라는 단어">현장에서 본 '구조적'이라는 단어</h2>
<p data-en="From the field, the word that matters most in the agenda is structural. For years the industry has explained its trouble as a passing storm — high rates, expensive materials, a thin pipeline — that would clear once the cycle turned. The shift this seminar signals is the admission that some of the pressure is not weather but climate. Material cost baselines have reset upward and stayed there; skilled labor is aging out faster than it is replaced; and project financing no longer flows on the old assumptions. None of these unwinds with a single rate cut. That is what makes &apos;structural&apos; more than a rhetorical flourish." data-ko="현장 시각에서 이번 발표문의 핵심어는 &apos;구조적&apos;이다. 업계는 수년간 어려움을 지나가는 폭풍으로 설명해 왔다. 높은 금리, 비싼 자재, 얇은 수주 — 경기가 돌면 걷힐 날씨라는 것이다. 이 세미나가 신호하는 변화는, 그 압박의 일부가 날씨가 아니라 기후라는 인정이다. 자재 원가 기준선은 한 단계 올라가 그대로 굳었고, 숙련 인력은 충원보다 빠르게 고령화로 빠져나가며, 프로젝트 금융은 옛 가정대로 흐르지 않는다. 어느 것도 금리 한 번으로 되돌아오지 않는다. &apos;구조적&apos;이 수사 이상의 무게를 갖는 이유다.">현장 시각에서 이번 발표문의 핵심어는 '구조적'이다. 업계는 수년간 어려움을 지나가는 폭풍으로 설명해 왔다. 높은 금리, 비싼 자재, 얇은 수주 — 경기가 돌면 걷힐 날씨라는 것이다. 이 세미나가 신호하는 변화는, 그 압박의 일부가 날씨가 아니라 기후라는 인정이다. 자재 원가 기준선은 한 단계 올라가 그대로 굳었고, 숙련 인력은 충원보다 빠르게 고령화로 빠져나가며, 프로젝트 금융은 옛 가정대로 흐르지 않는다. 어느 것도 금리 한 번으로 되돌아오지 않는다. '구조적'이 수사 이상의 무게를 갖는 이유다.</p>
<p data-en="There is a quieter point hidden in CERIK&apos;s framing. When the institute says the goal is to read the industry&apos;s constitution rather than its mood, it is implicitly conceding that demand-side stimulus has limits. The field would put it more bluntly: a market this constrained on the cost and labor side cannot be revived by cheaper money alone. If the second half brings relief, it will come from supply normalizing and policy holding steady long enough to plan around — not from a single dramatic announcement." data-ko="CERIK의 프레이밍에는 조용한 함의가 하나 숨어 있다. 분위기가 아니라 산업의 체질을 읽겠다고 말하는 순간, 수요 부양책의 한계를 은연중에 인정하는 셈이다. 현장은 더 직설적으로 말한다. 원가와 인력 양쪽에서 이만큼 묶인 시장은 값싼 돈만으로 살아나지 않는다. 하반기에 숨통이 트인다면, 그것은 공급이 정상화되고 정책이 계획을 세울 수 있을 만큼 오래 일관되게 유지되는 데서 올 것이다. 한 번의 극적인 발표에서 오지 않는다.">CERIK의 프레이밍에는 조용한 함의가 하나 숨어 있다. 분위기가 아니라 산업의 체질을 읽겠다고 말하는 순간, 수요 부양책의 한계를 은연중에 인정하는 셈이다. 현장은 더 직설적으로 말한다. 원가와 인력 양쪽에서 이만큼 묶인 시장은 값싼 돈만으로 살아나지 않는다. 하반기에 숨통이 트인다면, 그것은 공급이 정상화되고 정책이 계획을 세울 수 있을 만큼 오래 일관되게 유지되는 데서 올 것이다. 한 번의 극적인 발표에서 오지 않는다.</p>
<h2 data-en="What the Materials Side Should Watch" data-ko="자재 산업이 봐야 할 신호">자재 산업이 봐야 할 신호</h2>
<p data-en="For the construction and materials industry, the seminar matters less for its headline number than for two signals beneath it. First, the order environment: if CERIK reads public infrastructure and redevelopment as the second-half engine, demand concentrates on the materials those projects consume, on the timelines those projects set. Second, the financing read: if project finance stays tight, developers delay, and the safest demand shifts toward remodeling and public-certified value-tier materials that move without heavy upfront capital. Watching which of the two reports carries more conviction is, for a materials brand, worth more than the forecast itself." data-ko="건축·자재 산업 입장에서 이 세미나는 헤드라인 숫자보다 그 밑의 두 신호가 중요하다. 첫째, 수주 환경이다. CERIK이 공공 인프라와 정비사업을 하반기 엔진으로 읽는다면, 수요는 그 사업들이 소비하는 자재와 그 사업들이 정하는 일정에 집중된다. 둘째, 금융 진단이다. 프로젝트 금융이 계속 빡빡하면 개발은 미뤄지고, 가장 안전한 수요는 큰 선투자 없이도 움직이는 리모델링과 정부 인증 보급형 자재로 옮겨간다. 두 발표 중 어느 쪽이 더 확신을 담는지 — 자재 브랜드에게는 그 관찰이 전망 그 자체보다 값지다.">건축·자재 산업 입장에서 이 세미나는 헤드라인 숫자보다 그 밑의 두 신호가 중요하다. 첫째, 수주 환경이다. CERIK이 공공 인프라와 정비사업을 하반기 엔진으로 읽는다면, 수요는 그 사업들이 소비하는 자재와 그 사업들이 정하는 일정에 집중된다. 둘째, 금융 진단이다. 프로젝트 금융이 계속 빡빡하면 개발은 미뤄지고, 가장 안전한 수요는 큰 선투자 없이도 움직이는 리모델링과 정부 인증 보급형 자재로 옮겨간다. 두 발표 중 어느 쪽이 더 확신을 담는지 — 자재 브랜드에게는 그 관찰이 전망 그 자체보다 값지다.</p>
<div class="editor-note">
<h3 data-en="Editor&apos;s Note" data-ko="편집장 코멘트">편집장 코멘트</h3>
<p data-en="For ARCHINODE, the takeaway is timing, not just direction. If the market is structurally re-forming rather than simply cycling, then a brand&apos;s entry plan should be indexed to where steady demand lives during the constraint — public projects and remodeling — not to a hoped-for rebound. We will track the seminar&apos;s two reports closely: the order-environment read tells us which categories move first, and the financing read tells us how patient a market-entry runway needs to be. When a market reshapes its constitution, the brands that plan around the new constraints, rather than waiting out the old cycle, are the ones positioned when demand returns." data-ko="ARCHINODE 입장에서 핵심은 방향이 아니라 타이밍이다. 시장이 단순 순환이 아니라 구조적으로 재편되는 중이라면, 브랜드의 진입 계획은 막연한 반등이 아니라 제약 속에서도 꾸준한 수요가 머무는 곳 — 공공 사업과 리모델링 — 에 맞춰야 한다. 우리는 이번 세미나의 두 발표를 가까이 추적할 것이다. 수주 환경 진단은 어떤 카테고리가 먼저 움직이는지를, 금융 진단은 진입 활주로를 얼마나 길게 잡아야 하는지를 알려준다. 시장이 체질을 바꿀 때, 옛 사이클이 지나가기를 기다리는 브랜드가 아니라 새 제약을 전제로 계획하는 브랜드가 수요가 돌아올 때 자리를 잡는다.">ARCHINODE 입장에서 핵심은 방향이 아니라 타이밍이다. 시장이 단순 순환이 아니라 구조적으로 재편되는 중이라면, 브랜드의 진입 계획은 막연한 반등이 아니라 제약 속에서도 꾸준한 수요가 머무는 곳 — 공공 사업과 리모델링 — 에 맞춰야 한다. 우리는 이번 세미나의 두 발표를 가까이 추적할 것이다. 수주 환경 진단은 어떤 카테고리가 먼저 움직이는지를, 금융 진단은 진입 활주로를 얼마나 길게 잡아야 하는지를 알려준다. 시장이 체질을 바꿀 때, 옛 사이클이 지나가기를 기다리는 브랜드가 아니라 새 제약을 전제로 계획하는 브랜드가 수요가 돌아올 때 자리를 잡는다.</p>
